name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Use a login shell so the conda environment is activated in every step.
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up conda (Miniforge + mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: '3.10'
          activate-environment: fluxpark-ci
          channels: conda-forge
          channel-priority: strict

      - name: Install dependencies (GDAL via conda, package via pip)
        run: |
          mamba install -y gdal numpy pandas scipy openpyxl pyyaml \
            pytest "flake8>=7.0.0"
          pip install . --no-deps

      - name: Show versions
        run: |
          python -c "from osgeo import gdal; print('GDAL', gdal.__version__)"
          flake8 --version

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=88 \
            --ignore=E203,W503 \
            --exclude=.git,__pycache__,.venv,build,dist

      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q
